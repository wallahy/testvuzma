<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VyronClient — Minecraft's World's Best Client</title>
  <meta name="description" content="VyronClient is the ultimate Minecraft utility client. Packed with combat, render, movement, and player features — built for competitive gameplay and designed to dominate.">
  <link rel="icon" type="image/png" href="image-removebg-preview (6).png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #060608;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0f0;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 700px 500px at 25% 50%, rgba(124, 58, 237, 0.07), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Intro overlay ────────────────────────────────────── */
    .intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #060608;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .intro-overlay .intro-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.15), transparent 70%);
      animation: introGlow 2.5s ease forwards;
    }
    .intro-overlay .intro-logo {
      width: 300px;
      height: 300px;
      object-fit: contain;
      animation: introZoom 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .intro-overlay .intro-text {
      position: absolute;
      bottom: 30%;
      font-size: 13px;
      font-weight: 600;
      color: #4a4a62;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      animation: introFade 2.5s ease forwards;
      animation-delay: 0.5s;
    }
    .intro-overlay.fade-out {
      animation: introFadeOut 0.8s ease forwards;
    }
    @keyframes introZoom {
      0%   { transform: scale(3);   opacity: 0; filter: blur(20px); }
      30%  { opacity: 1;            filter: blur(0); }
      70%  { transform: scale(1);   opacity: 1; }
      100% { transform: scale(0.4); opacity: 0; filter: blur(8px); }
    }
    @keyframes introGlow {
      0%   { opacity: 0;   transform: scale(0.5); }
      30%  { opacity: 1; }
      70%  { opacity: 0.6; }
      100% { opacity: 0;   transform: scale(2); }
    }
    @keyframes introFade {
      0%   { opacity: 0;   transform: translateY(10px); }
      40%  { opacity: 0.6; }
      80%  { opacity: 0.3; }
      100% { opacity: 0; }
    }
    @keyframes introFadeOut {
      0%   { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }

    /* ── Brand ────────────────────────────────────────────── */
    .brand {
      position: fixed;
      top: 36px;
      left: 48px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .brand-logo img { width: 100%; height: 100%; object-fit: cover; }
    .brand-text h1 {
      font-size: 17px;
      font-weight: 700;
      color: #f0f0f8;
      letter-spacing: 0.01em;
    }
    .brand-text p {
      font-size: 10px;
      color: #4a4a62;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    /* ── Countdown ────────────────────────────────────────── */
    .countdown-wrap {
      position: fixed;
      top: 50%;
      left: 48px;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .countdown-label {
      font-size: 13px;
      font-weight: 600;
      color: #6a6a88;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .countdown-title {
      font-size: 38px;
      font-weight: 800;
      color: #f0f0f8;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }
    .countdown-title span {
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .countdown-sub {
      font-size: 15px;
      font-weight: 600;
      color: #7878a0;
      max-width: 340px;
      line-height: 1.4;
    }

    .countdown-tagline {
      font-size: 12px;
      color: #3a3a52;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }
    .countdown-tagline span {
      color: #7c3aed;
      font-weight: 600;
    }

    .countdown-grid {
      display: flex;
      gap: 14px;
      margin-top: 6px;
    }

    .cd-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .cd-num {
      font-size: 46px;
      font-weight: 800;
      color: #f0f0f8;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      background: rgba(12, 12, 18, 0.7);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px 10px;
      min-width: 80px;
      text-align: center;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .cd-num.pulse {
      border-color: rgba(124, 58, 237, 0.35);
      box-shadow: 0 0 16px rgba(124, 58, 237, 0.12);
    }

    .cd-unit {
      font-size: 10px;
      font-weight: 600;
      color: #3a3a52;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .cd-done {
      font-size: 18px;
      font-weight: 700;
      color: #a78bfa;
    }

    /* ── Menu 3D ──────────────────────────────────────────── */
    .menu-scene {
      position: fixed;
      right: 70px;
      top: 50%;
      transform: translateY(-50%);
      perspective: 1600px;
      z-index: 5;
    }

    .menu-3d {
      transform-style: preserve-3d;
      will-change: transform;
      border-radius: 14px;
    }

    .menu-iframe {
      width: 900px;
      height: 530px;
      border: none;
      border-radius: 14px;
      background: transparent;
      display: block;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.75), 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    /* ── Hint ─────────────────────────────────────────────── */
    .hint {
      position: fixed;
      bottom: 22px;
      left: 48px;
      z-index: 10;
      font-size: 10px;
      color: #2a2a3e;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .hint i { color: #333348; }

    /* ── Music player HUD ─────────────────────────────────── */
    .music-hud {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(12, 12, 18, 0.85);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 10px 18px;
      backdrop-filter: blur(12px);
      min-width: 380px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.5);
    }
    .music-hud .mh-cover {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: linear-gradient(135deg, #7c3aed, #4c1d95);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .music-hud .mh-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .music-hud .mh-cover .mh-cover-icon {
      font-size: 18px;
      color: #a78bfa;
    }
    .music-hud .mh-info {
      flex: 1;
      min-width: 0;
    }
    .music-hud .mh-title {
      font-size: 13px;
      font-weight: 600;
      color: #e8e8f5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .music-hud .mh-artist {
      font-size: 11px;
      color: #5a5a78;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .music-hud .mh-progress {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
      cursor: pointer;
    }
    .music-hud .mh-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #a78bfa, #7c3aed);
      border-radius: 2px;
      transition: width 0.2s linear;
    }
    .music-hud .mh-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .music-hud .mh-btn {
      background: none;
      border: none;
      color: #6a6a88;
      font-size: 14px;
      cursor: pointer;
      padding: 4px;
      transition: color 0.2s, transform 0.15s;
    }
    .music-hud .mh-btn:hover {
      color: #a78bfa;
      transform: scale(1.1);
    }
    .music-hud .mh-play {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      color: #a78bfa;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }
    .music-hud .mh-play:hover {
      background: rgba(124,58,237,0.3);
      transform: scale(1.08);
    }
    .music-hud .mh-time {
      font-size: 10px;
      color: #4a4a62;
      font-variant-numeric: tabular-nums;
      min-width: 70px;
      text-align: right;
    }
    .music-hud .mh-vol {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .music-hud .mh-vol input[type=range] {
      width: 60px;
      height: 3px;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      outline: none;
    }
    .music-hud .mh-vol input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #a78bfa;
      cursor: pointer;
    }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 1100px) {
      .menu-iframe { width: 700px; height: 450px; }
      .countdown-title { font-size: 30px; }
      .cd-num { font-size: 36px; min-width: 64px; }
    }
    @media (max-width: 850px) {
      .menu-iframe { width: 560px; height: 400px; }
      .menu-scene { right: 20px; }
      .countdown-wrap { left: 24px; }
      .brand { left: 24px; }
      .hint { left: 24px; }
      .music-hud { min-width: 300px; padding: 8px 12px; }
    }
  </style>
</head>
<body>

  <!-- Intro overlay -->
  <div class="intro-overlay" id="intro-overlay">
    <div class="intro-glow"></div>
    <img class="intro-logo" src="otherpic i want.png" alt="VyronClient"/>
    <div class="intro-text">VyronClient</div>
  </div>

  <!-- Brand -->
  <div class="brand">
    <div class="brand-logo">
      <img src="image-removebg-preview (6).png" alt="logo"/>
    </div>
    <div class="brand-text">
      <h1>VyronClient</h1>
      <p>v4.2</p>
    </div>
  </div>

  <!-- Countdown -->
  <div class="countdown-wrap">
    <div>
      <div class="countdown-label">Something Is Coming</div>
      <div class="countdown-title"><span>In 6 Days</span></div>
    </div>

    <div class="countdown-grid" id="countdown-timer">
      <div class="cd-block">
        <div class="cd-num" id="cd-days">06</div>
        <div class="cd-unit">Days</div>
      </div>
      <div class="cd-block">
        <div class="cd-num" id="cd-hours">00</div>
        <div class="cd-unit">Hours</div>
      </div>
      <div class="cd-block">
        <div class="cd-num" id="cd-mins">00</div>
        <div class="cd-unit">Min</div>
      </div>
      <div class="cd-block">
        <div class="cd-num" id="cd-secs">00</div>
        <div class="cd-unit">Sec</div>
      </div>
    </div>

    <div id="cd-done" style="display:none;" class="cd-done">
      <i class="fa-solid fa-circle-check"></i> Countdown complete!
    </div>

    <div class="countdown-tagline">Minecraft's <span>World's Best</span> Client</div>
  </div>

  <!-- Menu 3D -->
  <div class="menu-scene" id="menu-scene">
    <div class="menu-3d" id="menu-3d">
      <iframe class="menu-iframe" id="menu-iframe" src="menu.html" allowtransparency="true"></iframe>
    </div>
  </div>

  <!-- Hint -->
  <div class="hint">
    <i class="fa-solid fa-mouse"></i>
    Move your mouse — the menu tilts in 3D toward it
  </div>

  <!-- Music player HUD -->
  <div class="music-hud">
    <div class="mh-cover">
      <img src="JUICE.png" alt="cover"/>
    </div>
    <div class="mh-info">
      <div class="mh-title">Burner</div>
      <div class="mh-artist">VyronClient OST</div>
      <div class="mh-progress" id="mh-progress">
        <div class="mh-progress-bar" id="mh-progress-bar"></div>
      </div>
    </div>
    <div class="mh-controls">
      <button class="mh-btn" id="mh-prev"><i class="fa-solid fa-backward-step"></i></button>
      <button class="mh-play" id="mh-play"><i class="fa-solid fa-play" id="mh-play-icon"></i></button>
      <button class="mh-btn" id="mh-next"><i class="fa-solid fa-forward-step"></i></button>
    </div>
    <div class="mh-time" id="mh-time">0:00 / 0:00</div>
    <div class="mh-vol">
      <i class="fa-solid fa-volume-low" style="font-size:11px;color:#4a4a62;"></i>
      <input type="range" id="mh-volume" min="0" max="100" value="60"/>
    </div>
    <audio id="audio-player" src="Burner.mp3" preload="metadata"></audio>
  </div>

  <script>
    // ── Intro overlay removal ────────────────────────────────
    setTimeout(function() {
      var o = document.getElementById('intro-overlay');
      if (o) {
        o.classList.add('fade-out');
        setTimeout(function() { o.style.display = 'none'; }, 800);
      }
    }, 2500);

    // ── Music player ────────────────────────────────────────
    (function() {
      var audio = document.getElementById('audio-player');
      var btnPlay = document.getElementById('mh-play');
      var iconPlay = document.getElementById('mh-play-icon');
      var progressBar = document.getElementById('mh-progress-bar');
      var progressTrack = document.getElementById('mh-progress');
      var elTime = document.getElementById('mh-time');
      var volSlider = document.getElementById('mh-volume');

      audio.volume = 0.6;

      function fmt(s) {
        if (isNaN(s)) return '0:00';
        var m = Math.floor(s / 60);
        var sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' + sec : sec);
      }

      btnPlay.addEventListener('click', function() {
        if (audio.paused) {
          audio.play();
        } else {
          audio.pause();
        }
      });

      audio.addEventListener('play', function() {
        iconPlay.className = 'fa-solid fa-pause';
      });
      audio.addEventListener('pause', function() {
        iconPlay.className = 'fa-solid fa-play';
      });

      audio.addEventListener('loadedmetadata', function() {
        elTime.textContent = '0:00 / ' + fmt(audio.duration);
      });

      audio.addEventListener('timeupdate', function() {
        var pct = (audio.currentTime / audio.duration) * 100;
        progressBar.style.width = pct + '%';
        elTime.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
      });

      audio.addEventListener('ended', function() {
        audio.currentTime = 0;
        iconPlay.className = 'fa-solid fa-play';
      });

      progressTrack.addEventListener('click', function(e) {
        var rect = progressTrack.getBoundingClientRect();
        var pct = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pct * audio.duration;
      });

      volSlider.addEventListener('input', function() {
        audio.volume = this.value / 100;
      });

      document.getElementById('mh-prev').addEventListener('click', function() {
        audio.currentTime = Math.max(0, audio.currentTime - 10);
      });
      document.getElementById('mh-next').addEventListener('click', function() {
        audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
      });
    })();

    // ── 3D Tilt — menu follows mouse, goes flat when hovered ──
    (function() {
      var scene  = document.getElementById('menu-scene');
      var card   = document.getElementById('menu-3d');
      var iframe = document.getElementById('menu-iframe');

      var isDragging = false;
      var isHovering = false;
      var currentX = 0, currentY = 0;
      var targetRotX = 0, targetRotY = 0;
      var currentRotX = 0, currentRotY = 0;
      var dragStartX = 0, dragStartY = 0;

      scene.addEventListener('mouseenter', function() { isHovering = true; });
      scene.addEventListener('mouseleave', function() { isHovering = false; });

      document.addEventListener('mousemove', function(e) {
        if (isDragging) return;

        if (isHovering) {
          targetRotX = 0;
          targetRotY = 0;
          return;
        }

        var rect = card.getBoundingClientRect();
        var centerX = rect.left + rect.width / 2;
        var centerY = rect.top + rect.height / 2;

        var dx = (e.clientX - centerX) / (rect.width / 2);
        var dy = (e.clientY - centerY) / (rect.height / 2);

        var clampedDx = Math.max(-2, Math.min(2, dx));
        var clampedDy = Math.max(-2, Math.min(2, dy));

        targetRotY = clampedDx * 16;
        targetRotX = -clampedDy * 14;
      });

      function animate() {
        currentRotX += (targetRotX - currentRotX) * 0.1;
        currentRotY += (targetRotY - currentRotY) * 0.1;

        if (!isDragging) {
          card.style.transform =
            'translate(' + currentX + 'px, ' + currentY + 'px) ' +
            'rotateX(' + currentRotX.toFixed(2) + 'deg) ' +
            'rotateY(' + currentRotY.toFixed(2) + 'deg)';
        }
        requestAnimationFrame(animate);
      }
      animate();

      // ── Drag to reposition ────────────────────────────────
      scene.addEventListener('mousedown', function(e) {
        if (e.target === iframe) return;
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        iframe.style.pointerEvents = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        currentX = e.clientX - dragStartX;
        currentY = e.clientY - dragStartY;
        var tiltY = Math.max(-10, Math.min(10, currentX * 0.015));
        var tiltX = Math.max(-10, Math.min(10, -currentY * 0.015));
        card.style.transform =
          'translate(' + currentX + 'px, ' + currentY + 'px) ' +
          'rotateX(' + tiltX.toFixed(2) + 'deg) ' +
          'rotateY(' + tiltY.toFixed(2) + 'deg)';
      });

      document.addEventListener('mouseup', function() {
        if (!isDragging) return;
        isDragging = false;
        iframe.style.pointerEvents = '';
        try {
          localStorage.setItem('vyron_menu_pos', JSON.stringify({ x: currentX, y: currentY }));
        } catch(e) {}
      });

      // Restore saved position
      try {
        var saved = localStorage.getItem('vyron_menu_pos');
        if (saved) {
          var pos = JSON.parse(saved);
          if (pos && typeof pos.x === 'number') {
            currentX = pos.x;
            currentY = pos.y;
          }
        }
      } catch(e) {}

      // ── Touch support ─────────────────────────────────────
      scene.addEventListener('touchstart', function(e) {
        if (e.target === iframe) return;
        var t = e.touches[0];
        isDragging = true;
        dragStartX = t.clientX;
        dragStartY = t.clientY;
        iframe.style.pointerEvents = 'none';
        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchmove', function(e) {
        if (!isDragging) return;
        var t = e.touches[0];
        currentX = t.clientX - dragStartX;
        currentY = t.clientY - dragStartY;
        card.style.transform =
          'translate(' + currentX + 'px, ' + currentY + 'px) ' +
          'rotateX(' + (-currentY * 0.015).toFixed(2) + 'deg) ' +
          'rotateY(' + (currentX * 0.015).toFixed(2) + 'deg)';
        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchend', function() {
        if (!isDragging) return;
        isDragging = false;
        iframe.style.pointerEvents = '';
        try {
          localStorage.setItem('vyron_menu_pos', JSON.stringify({ x: currentX, y: currentY }));
        } catch(e) {}
      });
    })();

    // ── Countdown Timer (6 days, saved) ──────────────────────
    (function() {
      var STORAGE_KEY = 'vyron_countdown_target';
      var COUNTDOWN_DAYS = 6;
      var elDays = document.getElementById('cd-days');
      var elHours = document.getElementById('cd-hours');
      var elMins = document.getElementById('cd-mins');
      var elSecs = document.getElementById('cd-secs');
      var elTimer = document.getElementById('countdown-timer');
      var elDone = document.getElementById('cd-done');

      function getTarget() {
        try {
          var saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            var t = parseInt(saved, 10);
            if (!isNaN(t) && t > Date.now()) return t;
          }
        } catch(e) {}
        // Only create a new target if there is no valid saved one
        var target = Date.now() + COUNTDOWN_DAYS * 24 * 60 * 60 * 1000;
        try { localStorage.setItem(STORAGE_KEY, String(target)); } catch(e) {}
        return target;
      }

      // Check if we already have a valid target before creating a new one
      var target;
      try {
        var savedTarget = localStorage.getItem(STORAGE_KEY);
        if (savedTarget) {
          var parsed = parseInt(savedTarget, 10);
          if (!isNaN(parsed) && parsed > Date.now()) {
            target = parsed;
          }
        }
      } catch(e) {}
      if (!target) {
        target = Date.now() + COUNTDOWN_DAYS * 24 * 60 * 60 * 1000;
        try { localStorage.setItem(STORAGE_KEY, String(target)); } catch(e) {}
      }

      var lastSec = -1;

      function pad(n) { return n < 10 ? '0' + n : String(n); }

      function tick() {
        var now = Date.now();
        var diff = target - now;

        if (diff <= 0) {
          elTimer.style.display = 'none';
          elDone.style.display = 'block';
          return;
        }

        elTimer.style.display = 'flex';
        elDone.style.display = 'none';

        var days  = Math.floor(diff / 86400000); diff -= days * 86400000;
        var hours = Math.floor(diff / 3600000);  diff -= hours * 3600000;
        var mins  = Math.floor(diff / 60000);    diff -= mins * 60000;
        var secs  = Math.floor(diff / 1000);

        elDays.textContent  = pad(days);
        elHours.textContent = pad(hours);
        elMins.textContent  = pad(mins);
        elSecs.textContent  = pad(secs);

        if (secs !== lastSec) {
          lastSec = secs;
          elSecs.classList.remove('pulse');
          void elSecs.offsetWidth;
          elSecs.classList.add('pulse');
        }
      }

      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
